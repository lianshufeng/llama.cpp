master:
  push:
    - name: docker-build-and-push-cpu
      services:
        - docker
      docker:
        image: docker:24-git
      stages:
        - name: Build & Push (CPU)
          script:
            - |
              set -e

              echo "===== ENV CHECK ====="
              echo "CNB_DOCKER_REGISTRY=${CNB_DOCKER_REGISTRY}"
              echo "CNB_REPO_SLUG_LOWERCASE=${CNB_REPO_SLUG_LOWERCASE}"
              echo "CNB_COMMIT_SHORT=${CNB_COMMIT_SHORT}"
              echo "====================="

              docker login "${CNB_DOCKER_REGISTRY}" -u cnb -p "${CNB_TOKEN}"

              IMAGE_LATEST="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
              IMAGE_COMMIT="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT}"

              export DOCKER_BUILDKIT=1
              export BUILDKIT_PROGRESS=plain

              docker build --progress=plain \
                -f .devops/cpu.Dockerfile \
                -t "${IMAGE_LATEST}" \
                -t "${IMAGE_COMMIT}" \
                .

              docker push "${IMAGE_LATEST}"
              docker push "${IMAGE_COMMIT}"

    - name: docker-build-and-push-gpu
      services:
        - docker
      docker:
        image: docker:24-git
      stages:
        - name: Build & Push (GPU)
          script:
            - |
              set -e

              echo "===== ENV CHECK ====="
              echo "CNB_DOCKER_REGISTRY=${CNB_DOCKER_REGISTRY}"
              echo "CNB_REPO_SLUG_LOWERCASE=${CNB_REPO_SLUG_LOWERCASE}"
              echo "CNB_COMMIT_SHORT=${CNB_COMMIT_SHORT}"
              echo "====================="

              docker login "${CNB_DOCKER_REGISTRY}" -u cnb -p "${CNB_TOKEN}"

              IMAGE_GPU="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:gpu"
              IMAGE_COMMIT_GPU="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT_SHORT}-gpu"

              export DOCKER_BUILDKIT=1
              export BUILDKIT_PROGRESS=plain

              docker build --progress=plain \
                -f .devops/cuda.Dockerfile \
                -t "${IMAGE_GPU}" \
                -t "${IMAGE_COMMIT_GPU}" \
                .

              docker push "${IMAGE_GPU}"
              docker push "${IMAGE_COMMIT_GPU}"
